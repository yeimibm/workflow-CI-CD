# Production compose lives at /opt/week-14/compose.yml on the Hetzner host.
# The CI deploy job runs `docker compose pull && docker compose up -d` from that directory.
services:
  app:
    image: ghcr.io/yoelfme/admin-ti-2026/week-14:latest
    container_name: week14-app
    restart: unless-stopped
    ports:
      - "80:3000"
    env_file: .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
